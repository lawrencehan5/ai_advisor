analyze_survey_task:
  description: >
    Analyze the following raw survey responses from a user seeking financial advice.
    Extract and structure their financial profile.

    --- RAW SURVEY RESPONSES ---
    {survey_responses}
    --- END SURVEY RESPONSES ---

    You must produce a structured financial profile covering:
    1. Demographics: age, employment status, dependents
    2. Income & Expenses: monthly income, monthly expenses, savings rate
    3. Assets & Liabilities: current savings, investments, debts
    4. Investment Experience: prior investing experience level
    5. Investment Horizon: how long they plan to invest
    6. Financial Goals: stated short-term and long-term goals
    7. Investment amount they want to invest
    8. Any special considerations or constraints mentioned
  expected_output: >
    A structured financial profile in the following format:

    FINANCIAL PROFILE
    =================
    Demographics:
      - Age: ...
      - Employment: ...
      - Dependents: ...

    Income & Expenses:
      - Monthly Income: ...
      - Monthly Expenses: ...
      - Savings Rate: ...

    Assets & Liabilities:
      - Savings: ...
      - Existing Investments: ...
      - Debts: ...

    Investment Experience: [none / beginner / intermediate / advanced]
    Investment Horizon: [short-term / medium-term / long-term]
    Investment Amount: $...

    Financial Goals:
      - Short-term: ...
      - Long-term: ...

    Special Considerations: ...
  agent: survey_analyst

assess_risk_task:
  description: >
    Using the structured financial profile from the survey analyst, evaluate the
    user's risk tolerance and recommend BOTH a risk category AND a specific
    optimization strategy.

    Consider these factors:
    - Age and investment horizon (longer horizon = can take more risk)
    - Income stability and savings cushion
    - Debt-to-income ratio
    - Investment experience
    - Stated risk comfort from survey answers
    - Financial goals (retirement vs. short-term savings have different risk profiles)

    Step 1 — Assign ONE risk category:
    - CONSERVATIVE: Capital preservation focus
    - MODERATE: Slight growth tilt
    - BALANCED: Equal weight growth and stability
    - GROWTH: Equity-heavy, comfortable with moderate volatility
    - AGGRESSIVE: Maximum growth, comfortable with high volatility

    Step 2 — Recommend ONE optimization strategy from this list:
    {available_strategies}

    Match the optimization strategy to the user's profile:
    - Conservative/low-experience users → minimum_variance or equally_weighted
    - Moderate users → equal_risk_contribution or robust_mean_variance
    - Balanced users → max_sharpe_ratio or robust_mean_variance
    - Growth users → max_sharpe_ratio or max_expected_return
    - Aggressive/experienced users → leveraged_max_sharpe or max_expected_return

    Additionally, apply these hard rules:
    - If investment_style is passive → strongly prefer market_tracking or minimum_variance.
    - If investment_style is active → prefer max_expected_return or max_sharpe_ratio.
    - If leverage_comfort is "no" → NEVER recommend leveraged_max_sharpe.
    - If experience is None or Beginner → avoid leveraged_max_sharpe and max_expected_return.
    - If investment_horizon is less than 3 years → prefer minimum_variance or equally_weighted.
  expected_output: >
    RISK ASSESSMENT
    ===============
    Risk Tolerance Score: [1-10]
    Risk Category: [CONSERVATIVE / MODERATE / BALANCED / GROWTH / AGGRESSIVE]
    Recommended Optimization Strategy: [exact strategy key, e.g. max_sharpe_ratio]

    Key Factors:
      - [factor 1 and how it influenced the assessment]
      - [factor 2 ...]
      - [factor 3 ...]

    Strategy Justification: [2-3 sentences explaining why this optimization
    method is the best fit for this user's situation]
  agent: risk_assessor

present_portfolio_task:
  description: >
    The CPLEX portfolio optimizer has been run with the following results.
    Present these results to the user in a clear, actionable format.

    --- OPTIMIZER OUTPUT ---
    Strategy Used: {optimizer_strategy}
    Expected Annual Return: {expected_return}
    Expected Annual Volatility: {expected_volatility}
    Sharpe Ratio: {sharpe_ratio}

    Optimized Allocations:
    {optimizer_allocations}
    --- END OPTIMIZER OUTPUT ---

    --- USER CONTEXT ---
    Risk Category: {risk_category}
    Investment Amount: {investment_amount}
    --- END USER CONTEXT ---

    Your job:
    1. Translate percentages into dollar amounts based on the investment amount.
    2. Explain what each holding is and why the optimizer included it.
    3. Summarize the overall portfolio characteristics (equity vs bonds, sectors, etc.).
    4. Explain the expected risk/return in plain language.
    5. Note any important caveats or next steps.
    6. Include a disclaimer.
  expected_output: >
    PORTFOLIO RECOMMENDATION
    ========================
    Strategy: [strategy name]
    Total Investment: $[amount]

    Holdings:
      1. [TICKER] ([Name]) — [XX.X%] ($[amount]) — [what this is and why it's included]
      2. ...

    Portfolio Metrics:
      - Expected Annual Return: [X.X%]
      - Expected Annual Volatility: [X.X%]
      - Sharpe Ratio: [X.XX]

    Portfolio Breakdown:
      - Equities: XX%
      - Fixed Income: XX%
      - Alternatives: XX%

    What This Means For You: [2-3 sentences in plain language about what to expect]

    Next Steps: [actionable suggestions]

    DISCLAIMER: This is AI-generated guidance using quantitative optimization for
    informational purposes only. It does not constitute professional financial advice.
    Past performance does not guarantee future results. Please consult a licensed
    financial advisor before making investment decisions.
  agent: portfolio_advisor
