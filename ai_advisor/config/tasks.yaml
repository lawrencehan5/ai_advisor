analyze_survey_task:
  description: >
    Analyze the following raw survey responses from a user seeking financial advice.
    Extract and structure their financial profile.

    --- RAW SURVEY RESPONSES ---
    {survey_responses}
    --- END SURVEY RESPONSES ---

    You must produce a structured financial profile covering:
    1. Demographics: age, employment status, dependents
    2. Income & Expenses: monthly income, monthly expenses, savings rate
    3. Assets & Liabilities: current savings, investments, debts
    4. Investment Experience: prior investing experience level
    5. Investment Horizon: how long they plan to invest
    6. Financial Goals: stated short-term and long-term goals
    7. Any special considerations or constraints mentioned
  expected_output: >
    A structured financial profile in the following format:

    FINANCIAL PROFILE
    =================
    Demographics:
      - Age: ...
      - Employment: ...
      - Dependents: ...

    Income & Expenses:
      - Monthly Income: ...
      - Monthly Expenses: ...
      - Savings Rate: ...

    Assets & Liabilities:
      - Savings: ...
      - Existing Investments: ...
      - Debts: ...

    Investment Experience: [none / beginner / intermediate / advanced]
    Investment Horizon: [short-term / medium-term / long-term]

    Financial Goals:
      - Short-term: ...
      - Long-term: ...

    Special Considerations: ...
  agent: survey_analyst

assess_risk_task:
  description: >
    Using the structured financial profile from the survey analyst, evaluate the
    user's risk tolerance and assign an investment strategy.

    Consider these factors:
    - Age and investment horizon (longer horizon = can take more risk)
    - Income stability and savings cushion
    - Debt-to-income ratio
    - Investment experience
    - Stated risk comfort from survey answers
    - Financial goals (retirement vs. short-term savings have different risk profiles)

    Assign ONE of these strategy categories:
    - CONSERVATIVE: Capital preservation focus, mostly bonds/fixed-income ETFs
    - MODERATE: Slight growth tilt, balanced between bonds and equities
    - BALANCED: Equal weight growth and stability
    - GROWTH: Equity-heavy, comfortable with moderate volatility
    - AGGRESSIVE: Maximum growth, high equity allocation, comfortable with high volatility
  expected_output: >
    RISK ASSESSMENT
    ===============
    Risk Tolerance Score: [1-10]
    Strategy Category: [CONSERVATIVE / MODERATE / BALANCED / GROWTH / AGGRESSIVE]

    Key Factors:
      - [factor 1 and how it influenced the assessment]
      - [factor 2 ...]
      - [factor 3 ...]

    Justification: [2-3 sentence explanation of why this strategy fits the user]
  agent: risk_assessor

recommend_portfolio_task:
  description: >
    Using the financial profile and risk assessment, construct a specific portfolio
    allocation from ONLY the following approved securities:

    {approved_securities}

    RULES:
    - ONLY use tickers from the above list. Never recommend anything outside it.
    - Allocations must sum to exactly 100%.
    - Select 5-12 securities for diversification.
    - Match the allocation to the assigned strategy category.
    - Provide a brief rationale for each holding.

    Strategy category: Use the one determined by the risk assessor.
  expected_output: >
    RECOMMENDED PORTFOLIO
    =====================
    Strategy: [strategy category]
    Number of Holdings: [N]

    Allocation:
      1. [TICKER] - [Name] - [XX%] - [brief rationale]
      2. [TICKER] - [Name] - [XX%] - [brief rationale]
      ...

    Portfolio Summary:
      - Equity Allocation: XX%
      - Fixed Income Allocation: XX%
      - Alternative Allocation: XX%

    Key Rationale: [2-3 sentences on why this portfolio suits the user]

    DISCLAIMER: This is AI-generated guidance for informational purposes only.
    It does not constitute professional financial advice. Please consult a
    licensed financial advisor before making investment decisions.
  agent: portfolio_advisor